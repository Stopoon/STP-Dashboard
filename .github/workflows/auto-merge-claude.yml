name: Auto-merge claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Create PR and auto-merge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const branch = context.ref.replace('refs/heads/', '');

            // 신규 커밋 여부 확인 (main과 동일하면 스킵)
            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner: context.repo.owner,
              repo: context.repo.repo,
              basehead: `main...${branch}`
            });
            if (comparison.data.ahead_by === 0) {
              console.log(`브랜치 ${branch}에 신규 커밋이 없습니다. 스킵합니다.`);
              return;
            }

            // Create PR
            let pr;
            try {
              pr = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Auto: ${branch}`,
                head: branch,
                base: 'main',
                body: 'claude/* 브랜치 자동 머지'
              });
              console.log(`PR #${pr.data.number} 생성 완료`);
            } catch (e) {
              if (e.message && e.message.includes('No commits between')) {
                console.log('main과 차이가 없어 PR 생성을 건너뜁니다.');
                return;
              }
              // PR already exists, find it
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head: `${context.repo.owner}:${branch}`,
                base: 'main',
                state: 'open'
              });
              if (prs.data.length === 0) throw e;
              pr = { data: prs.data[0] };
              console.log(`기존 PR #${pr.data.number} 사용`);
            }

            // mergeable 상태 폴링 (최대 10회, 3초 간격)
            let mergeable = null;
            for (let i = 0; i < 10; i++) {
              await new Promise(r => setTimeout(r, 3000));
              const prDetail = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.data.number
              });
              mergeable = prDetail.data.mergeable;
              console.log(`mergeable 상태 확인 (${i + 1}/10): ${mergeable}`);
              if (mergeable === true) break;
              if (mergeable === false) {
                throw new Error(`PR #${pr.data.number} 병합 불가 상태입니다.`);
              }
            }
            if (mergeable !== true) {
              throw new Error('mergeable 상태 확인 타임아웃: 30초 내 확인 불가');
            }

            // Merge PR
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.data.number,
              merge_method: 'squash'
            });
            console.log(`PR #${pr.data.number} squash merge 완료`);

            // 소스 브랜치 삭제
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
              console.log(`브랜치 ${branch} 삭제 완료`);
            } catch (e) {
              console.log(`브랜치 삭제 실패 (무시): ${e.message}`);
            }

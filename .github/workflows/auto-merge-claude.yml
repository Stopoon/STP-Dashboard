name: Auto-merge claude branches

on:
  push:
    branches:
      - 'claude/**'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Apply branch changes directly to main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"

          git fetch origin main
          git fetch origin "$BRANCH"

          # 파일 변경사항 비교
          DIFF=$(git diff origin/main "origin/$BRANCH" -- .)
          if [ -z "$DIFF" ]; then
            echo "No file changes vs main. Skipping."
            exit 0
          fi

          # main으로 이동 후 변경사항 적용
          git checkout main
          git diff origin/main "origin/$BRANCH" | git apply --whitespace=fix
          git add -A

          # 커밋할 변경사항 확인
          if git diff --staged --quiet; then
            echo "Nothing to commit. Skipping."
            exit 0
          fi

          git commit -m "Auto: $BRANCH"
          git push origin main

          # 소스 브랜치 삭제
          git push origin --delete "$BRANCH" || echo "Branch delete skipped"
